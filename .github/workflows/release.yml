name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Add Windows MSVC target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Generate placeholder icons
        run: python scripts/gen-icons.py

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build
        run: cargo tauri build --target x86_64-pc-windows-msvc
        env:
          RUST_LOG: info

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Recurse src-tauri/target/x86_64-pc-windows-msvc/release/bundle `
            -Include *.exe,*.msi | Copy-Item -Destination artifacts/

      - name: Upload artifacts (CI cache)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      # ── GitHub Packages: push installer as OCI artifact to Container Registry ──

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push installer to GitHub Packages (ghcr.io)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name || inputs.tag }}"
          $owner   = "${{ github.repository_owner }}".ToLower()
          $ref     = "ghcr.io/${owner}/github-notifier-ws:${version}"
          $latest  = "ghcr.io/${owner}/github-notifier-ws:latest"

          # Prefer NSIS .exe; fall back to .msi
          $installer = Get-ChildItem artifacts -Filter *.exe | Select-Object -First 1
          if (-not $installer) {
              $installer = Get-ChildItem artifacts -Filter *.msi | Select-Object -First 1
          }
          if (-not $installer) { Write-Error "インストーラが見つかりません"; exit 1 }

          $file = $installer.FullName
          $name = $installer.Name
          Write-Host "Pushing $name as $ref ..."

          oras push $ref "${file}:application/octet-stream" `
              --annotation "org.opencontainers.image.title=${name}" `
              --annotation "org.opencontainers.image.version=${version}" `
              --annotation "org.opencontainers.image.description=github-notifier-ws Windows installer" `
              --annotation "org.opencontainers.image.url=https://github.com/${{ github.repository }}"

          oras push $latest "${file}:application/octet-stream" `
              --annotation "org.opencontainers.image.title=${name}" `
              --annotation "org.opencontainers.image.version=${version}" `
              --annotation "org.opencontainers.image.description=github-notifier-ws Windows installer" `
              --annotation "org.opencontainers.image.url=https://github.com/${{ github.repository }}"

          Write-Host "Published: $ref"
          Write-Host "Published: $latest"

      # ── GitHub Releases: attach installer for direct download link ─────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: github-notifier-ws ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## インストール方法

            ### 方法 1 — PowerShell スクリプト（GitHub Packages から）

            管理者 PowerShell で以下を実行します：

            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```

            または特定バージョンを指定：

            ```powershell
            & ([scriptblock]::Create((irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1))) -Version "${{ github.ref_name || inputs.tag }}"
            ```

            ### 方法 2 — 直接ダウンロード

            下の `.exe`（NSIS インストーラ）または `.msi` をダウンロードして実行します。

            ---

            ## 初回セットアップ

            1. インストール後、起動するとトークン入力ウィンドウが開きます。
            2. `notifications` スコープの GitHub PAT（Classic）を入力してください。
            3. トークンは **Windows Credential Manager** に保存されます。
            4. 以降はシステムトレイに常駐し、`%APPDATA%\github-notifier-ws\config.yaml` でルールを設定できます。

            ## 設定例

            ```yaml
            poll_interval: 60
            bundle_threshold: 3
            allow_destructive: false
            default: ignore

            rules:
              - name: direct
                match:
                  reason: [mention, review_requested, assign]
                action: notify
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
