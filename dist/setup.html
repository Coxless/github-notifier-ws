<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>セットアップ — github-notifier-ws</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f6f8fa;
      padding: 28px;
      color: #1f2328;
    }
    h2 { font-size: 18px; margin-bottom: 8px; }
    p { font-size: 13px; color: #57606a; margin-bottom: 16px; line-height: 1.6; }
    code { background: #eef0f2; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    input[type=password] {
      width: 100%; padding: 8px 12px;
      border: 1px solid #d0d7de; border-radius: 6px;
      font-size: 14px; outline: none; margin-bottom: 8px;
    }
    input[type=password]:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.1); }
    button {
      background: #2da44e; color: #fff;
      border: none; padding: 8px 20px;
      border-radius: 6px; font-size: 14px; cursor: pointer;
    }
    button:hover { background: #2c974b; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    #error { color: #d1242f; font-size: 13px; margin-top: 8px; display: none; }
    #success { color: #2da44e; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h2>GitHub トークンのセットアップ</h2>
  <p>
    <code>notifications</code> スコープの GitHub Personal Access Token (classic) を入力してください。<br>
    トークンは Windows Credential Manager に安全に保存されます。YAML には書きません。
  </p>
  <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" autofocus>
  <p id="error"></p>
  <p id="success">保存しました。ウィンドウを閉じてください。</p>
  <button id="btn" onclick="save()">保存して開始</button>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;

    document.getElementById('token').addEventListener('keydown', e => {
      if (e.key === 'Enter') save();
    });

    async function save() {
      const token = document.getElementById('token').value.trim();
      if (!token) return;
      const btn = document.getElementById('btn');
      btn.disabled = true;
      document.getElementById('error').style.display = 'none';
      try {
        await invoke('set_github_token', { token });
        document.getElementById('success').style.display = 'block';
        setTimeout(() => getCurrentWebviewWindow().close(), 800);
      } catch (e) {
        document.getElementById('error').textContent = String(e);
        document.getElementById('error').style.display = 'block';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
